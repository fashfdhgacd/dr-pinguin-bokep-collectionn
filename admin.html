<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin • Dr. Harimau Bokep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <!-- End Vercel Web Analytics -->
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-5xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-4xl font-bold">Admin Panel</h1>
        <p class="text-emerald-400">Koleksi Dr. Pinguin Bokep, M.S.B.</p>
      </div>
      <a href="index.html" class="px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 rounded-2xl text-sm flex items-center gap-2 border border-zinc-700">
        <i class="fas fa-arrow-left"></i>
        <span>Kembali ke Gallery</span>
      </a>
    </div>

    <!-- GitHub Token -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8">
      <h3 class="font-semibold mb-3">GitHub Token</h3>
      <div class="flex gap-3">
        <input id="token" type="password" placeholder="Paste GitHub Token" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
        <button onclick="saveToken()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">Simpan Token</button>
      </div>
    </div>

    <!-- Tambah Video -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
      <h2 class="text-2xl font-semibold mb-6">Tambah Video Massal</h2>

      <div class="mb-4">
        <label class="block text-sm text-zinc-400 mb-2">Judul + Link (bergantian)</label>
        <textarea id="input" rows="12" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-4 font-mono text-sm" placeholder="Judul Video 1
https://tv1.userbokep.com/e/xxxxxx

Judul Video 2
https://tv1.indoav.app/e/yyyyyy"></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm text-zinc-400 mb-2">Kategori</label>
        <select id="category" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3">
          <option value="MILF">MILF</option>
          <option value="Amatir">Amatir</option>
          <option value="Live">Live</option>
          <option value="ABG">ABG</option>
          <option value="Jilbab">Jilbab</option>
          <option value="Office">Office</option>
          <option value="Umum" selected>Umum</option>
        </select>
      </div>

      <button onclick="addVideos()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-bold text-lg">
        Tambah Video &amp; Update Otomatis
      </button>

      <div id="result" class="mt-6 hidden bg-emerald-900 border border-emerald-700 rounded-2xl p-5 text-emerald-300"></div>
    </div>
  </div>

  <script>
    function saveToken() {
      const token = document.getElementById('token').value.trim();
      if (token) {
        localStorage.setItem('github_token', token);
        alert('Token disimpan!');
      }
    }

    async function addVideos() {
      const token = document.getElementById('token').value.trim() || localStorage.getItem('github_token');
      if (!token) {
        alert('Token GitHub belum diisi');
        return;
      }

      const input = document.getElementById('input').value.trim();
      const category = document.getElementById('category').value;

      if (!input) {
        alert('Input kosong');
        return;
      }

      const lines = input.split('\n').map(l => l.trim()).filter(Boolean);
      const newVideos = [];
      let currentTitle = '';
      let id = Date.now();

      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith('http')) {
          if (!currentTitle) continue;
          const embed = lines[i];
          newVideos.push({
            id: id++,
            title: currentTitle,
            embed: embed,
            direct: embed.replace('/e/', '/d/'),
            source: embed.includes('indoav.app') ? 'IndoAV' : 'UserBokep',
            category: category
          });
          currentTitle = '';
        } else {
          currentTitle = lines[i];
        }
      }

      if (newVideos.length === 0) {
        alert('Tidak ada video valid');
        return;
      }

      try {
        const res = await fetch('https://api.github.com/repos/fashfdhgacd/dr-harimau-bokep-collection/contents/videos.json', {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        const file = await res.json();
        const current = JSON.parse(atob(file.content));

        const existing = new Set(current.map(v => v.embed));
        const unique = newVideos.filter(v => !existing.has(v.embed));

        if (unique.length === 0) {
          alert('Semua video sudah ada');
          return;
        }

        const updated = [...unique, ...current];

        const putRes = await fetch('https://api.github.com/repos/fashfdhgacd/dr-harimau-bokep-collection/contents/videos.json', {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: `Add ${unique.length} videos`,
            content: btoa(unescape(encodeURIComponent(JSON.stringify(updated, null, 2)))),
            sha: file.sha
          })
        });

        if (!putRes.ok) throw new Error('Gagal commit');

        document.getElementById('result').classList.remove('hidden');
        document.getElementById('result').innerHTML = `${unique.length} video berhasil ditambahkan.`;
        document.getElementById('input').value = '';

      } catch (e) {
        alert(e.message);
      }
    }

    // Load saved token
    window.onload = function() {
      const t = localStorage.getItem('github_token');
      if (t) document.getElementById('token').value = t;
    };
  </script>
</body>
</html>
